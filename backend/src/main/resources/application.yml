server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: chess-backend

  # ─── MySQL Database ───
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:chessdb}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${DB_USER:chessuser}
    password: ${DB_PASSWORD:chesspassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000

  # ─── JPA / Hibernate ───
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  # ─── Redis Cache ───
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          max-wait: -1ms

  # ─── Jackson ───
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: NON_NULL

# ─── JWT Configuration ───
jwt:
  secret: ${JWT_SECRET:c2hlc3NhcHBzdXBlcnNlY3JldGtleW11c3RiZWF0bGVhc3Q1MTJiaXRzbG9uZ2ZvckhTNTEy}
  expiration-ms: 86400000       # 24 hours
  refresh-expiration-ms: 604800000  # 7 days

# ─── Ollama Configuration ───
ollama:
  base-url: ${OLLAMA_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3}
  timeout-seconds: 60

# ─── App Settings ───
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  max-games-per-user: 20

# ─── Logging ───
logging:
  level:
    root: INFO
    com.chessapp: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/chess-app.log
    max-size: 10MB
    max-history: 30
